---
name: pihole

services:
  pihole: # https://github.com/kubernetes-sigs/external-dns/issues/5113
    image: ghcr.io/pi-hole/pihole:2024.07.0@sha256:0def896a596e8d45780b6359dbf82fc8c75ef05b97e095452e67a0a4ccc95377
    container_name: pihole
    volumes:
      - /share/Docker/pihole-docker/etc-pihole/:/etc/pihole/
      - /share/Docker/pihole-docker/etc-dnsmasq.d/:/etc/dnsmasq.d/
    environment:
      TZ: &tz Europe/Amsterdam
      DNSMASQ_LISTENING: all
      WEBTHEME: default-dark
      WEB_PORT: &port 3001
      WEBPASSWORD: $WEBPASSWORD
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "3001:3001/tcp"
    network_mode: host
    restart: always
    dns:
      - 127.0.0.1
      - 1.1.1.1

  pihole-exporter:
    image: ekofr/pihole-exporter:v1.0.1@sha256:c33eec2a8308fa510608b93d4921bb62f75f6132f8792b24e63972835f624496
    container_name: pihole-exporter
    depends_on:
      - pihole
    environment:
      TZ: *tz
      PIHOLE_PROTOCOL: http
      PIHOLE_HOSTNAME: localhost
      PIHOLE_PORT: *port
      PIHOLE_API_TOKEN: $WEBPASSWORD
    ports:
      - "9617:9617/tcp"
    restart: always
