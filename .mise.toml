[settings]
pipx_uvx = true
experimental = true        # for uv_venv_auto
python.uv_venv_auto = true

[env]
KUBECONFIG = "{{ config_root }}/kubeconfig"
TALOSCONFIG = "{{ config_root }}/talosconfig"
MINIJINJA_CONFIG_FILE = "{{ config_root }}/.github/.minijinja.toml"
HOMEBREW_BREWFILE = "{{ config_root }}/.github/Brewfile"
_.path = ['{{config_root}}/node_modules/.bin']

[tools]
# https://docs.renovatebot.com/modules/manager/mise/#supported-default-registry-tool-short-names
uv = "0.10.10"
python = "3"
node = "24.14.0"

# Flux
"aqua:flux2" = "2.8.2"

# Kube
"aqua:CrunchyData/postgres-operator-client" = "0.5.3"
"aqua:kustomize" = "5.8.1"
"aqua:helm" = "4.1.3"
"github:helmfile/helmfile" = "1.4.2"
"aqua:derailed/k9s" = "0.50.18"
"aqua:stern/stern" = "1.33.1"

# Talos
"aqua:siderolabs/talos" = "1.12.5"

# Tools
"aqua:yq" = "4.52.4"
"aqua:jq" = "1.8.1"
"github:DopplerHQ/cli" = "3.75.3"
"cargo:minijinja-cli" = "2.7.0"
"github:gorcon/rcon-cli" = { version = "0.10.3", exe = "rcon" }
"github:slsa-framework/slsa-verifier" = "2.7.1"
"aqua:Orange-OpenSource/hurl" = "7.1.0"

# hk
"aqua:hk" = "1.38.0"
"aqua:pkl" = "0.31.0"
"aqua:ruff" = "0.15.6"
"npm:dclint" = "3.1.0"
"npm:renovate" = "43.76.1"
"aqua:actionlint" = "1.7.11"
"npm:prettier" = "3.8.1"
"aqua:shellcheck" = "0.11.0"
rust = "1.94.0"
kubecolor = "latest"
kubens = "0.9.5"
just = "1.47.0"
gum = "0.17.0"
"cargo:just-lsp" = "0.3.4"
rumdl = "0.1.40"
shfmt = "3.13.0"
