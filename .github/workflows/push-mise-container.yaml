# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---
name: "Build tool container"
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .mise.toml
      - .github/workflows/push-mise-container.yaml

permissions:
  packages: write
  contents: read

jobs:
  build:
    name: Build container
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/stevewm/tools
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          app-id: "${{ secrets.BOTTY_HILL_APP_ID }}"
          private-key: "${{ secrets.BOTTY_HILL_PRIVATE_KEY }}"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: "${{ steps.app-token.outputs.token }}"

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - run: crane auth login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

      - run: echo "TAG=${{ env.IMAGE }}:${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Build and push container
        run: mise oci push --tool crane "${{ env.TAG }}"

      - name: Clean up old images
        uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55 # v5
        with:
          package-name: tools
          package-type: container
          min-versions-to-keep: 5
          delete-only-untagged-versions: "true"
