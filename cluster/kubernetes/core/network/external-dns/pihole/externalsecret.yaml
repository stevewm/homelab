# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pihole
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler
  target:
    name: pihole
  data:
    - secretKey: password
      remoteRef:
        key: PIHOLE_PSW
    - secretKey: api_token
      remoteRef:
        key: PIHOLE_API_KEY
