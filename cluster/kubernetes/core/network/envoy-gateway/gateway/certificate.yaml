# yaml-language-server: $schema=https://crds.stevewm.dev/crds/cert-manager.io/certificate_v1.json
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cluster-gateway-cert
spec:
  secretName: cluster-gateway-cert-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: stevewm.dev
  dnsNames:
    - stevewm.dev
    - "*.stevewm.dev"
