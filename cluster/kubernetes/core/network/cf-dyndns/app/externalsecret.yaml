# yaml-language-server: $schema=https://crds.stevewm.dev/crds/external-secrets.io/externalsecret_v1.json
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-dyndns
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler
  target:
    name: cloudflare-dyndns
  data:
    - secretKey: api_token
      remoteRef:
        key: CLOUDFLARE_EXTERNALDNS_TOKEN
