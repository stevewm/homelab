# yaml-language-server: $schema=https://crds.stevewm.dev/crds/grafana.integreatly.org/grafanadashboard_v1beta1.json
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: dragonfly-operator
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasources:
    - datasourceName: Prometheus
      inputName: DS_PROMETHEUS
  url: https://raw.githubusercontent.com/dragonflydb/dragonfly-operator/main/observability/grafana-dashboard.json
