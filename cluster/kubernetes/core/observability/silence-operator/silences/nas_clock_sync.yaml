# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/observability.giantswarm.io/silence_v1alpha2.json
---
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: nas-clock-sync
spec: # it's definitely synced ¯\_(ツ)_/¯
  matchers:
    - name: alertname
      value: NodeClockNotSynchronising
      matchType: "="
    - name: instance
      value: lilnas.home.arpa:9100
      matchType: "="
