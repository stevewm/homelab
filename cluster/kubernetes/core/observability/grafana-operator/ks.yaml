# yaml-language-server: $schema=https://crds.stevewm.dev/crds/kustomize.toolkit.fluxcd.io/kustomization_v1.json
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: core-grafana-operator
  namespace: &namespace observability
spec:
  targetNamespace: *namespace
  commonMetadata:
    labels:
      app.kubernetes.io/name: grafana-operator
  interval: 30m
  timeout: 5m
  path: ./cluster/kubernetes/core/observability/grafana-operator/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab
    namespace: flux-system
  wait: true
  dependsOn:
    - name: core-kube-prometheus-stack


# yaml-language-server: $schema=https://crds.stevewm.dev/crds/kustomize.toolkit.fluxcd.io/kustomization_v1.json
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: core-grafana-instance
  namespace: &namespace observability
spec:
  targetNamespace: *namespace
  commonMetadata:
    labels:
      app.kubernetes.io/name: &app grafana-operator
  interval: 30m
  timeout: 5m
  path: ./cluster/kubernetes/core/observability/grafana-operator/instance
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab
    namespace: flux-system
  wait: true
  dependsOn:
    - name: core-grafana-operator
  components:
    - ../../../../components/sso-secret
  postBuild:
    substitute:
      APP: grafana
      OAUTH_SECRET_KEY_NAME: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
