# yaml-language-server: $schema=https://crds.stevewm.dev/crds/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app smartctl-exporter
spec:
  interval: 30m
  maxHistory: 3
  chartRef:
    kind: OCIRepository
    name: *app
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: -1
  uninstall:
    keepHistory: false
  driftDetection:
    mode: warn
  values:
    fullnameOverride: *app

    config:
      devices:
        - /dev/nvme0n1
        - /dev/nvme1n1

    serviceMonitor:
      enabled: true

    prometheusRules:
      enabled: false
