# yaml-language-server: $schema=https://crds.stevewm.dev/crds/external-secrets.io/externalsecret_v1.json
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ${APP}-dragonfly
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler
  target:
    name: ${APP}-dragonfly
  data:
    - secretKey: password
      remoteRef:
        key: ${APP^^}_DRAGONFLY_PASSWORD
