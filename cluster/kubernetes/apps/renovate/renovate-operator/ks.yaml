# yaml-language-server: $schema=https://crds.stevewm.dev/crds/kustomize.toolkit.fluxcd.io/kustomization_v1.json
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app-renovate-operator
  namespace: &namespace renovate
spec:
  targetNamespace: *namespace
  commonMetadata:
    labels:
      app.kubernetes.io/name: renovate-operator
  interval: 30m
  timeout: 5m
  path: ./cluster/kubernetes/apps/renovate/renovate-operator/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab
    namespace: flux-system
  wait: true
  components:
    - ../../../../components/sso-secret
  postBuild:
    substitute:
      APP: renovate


