---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app renovate-operator
spec:
  interval: 30m
  maxHistory: 3
  chartRef:
    kind: OCIRepository
    name: renovate-operator
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: -1
  uninstall:
    keepHistory: false
  driftDetection:
    mode: warn
  values:
    fullnameOverride: *app
    auth:
      oidc:
        enabled: true
        issuerUrl: https://sso.stevewm.dev
        clientId: renovate
        existingSecret: renovate-sso
        secretKey: client_secret
    route:
      enabled: true
      hostnames:
        - renovate.stevewm.dev
    webhook:
      enabled: true
    parentRefs:
      - name: envoy-internal
        namespace: network
    jobTTLSecondsAfterFinished: 86400 # 1 day
