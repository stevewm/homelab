# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sabnzbd
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler
  target:
    name: sabnzbd
  data:
    - secretKey: api_key
      remoteRef:
        key: SABNZBD_API_KEY
    - secretKey: nzb_key
      remoteRef:
        key: SABNZBD_NZB_KEY
