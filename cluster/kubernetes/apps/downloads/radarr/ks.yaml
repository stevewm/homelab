# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-radarr
  namespace: &namespace downloads
spec:
  targetNamespace: *namespace
  commonMetadata:
    labels:
      app.kubernetes.io/name: &app radarr
  interval: 30m
  timeout: 5m
  path: ./cluster/kubernetes/apps/downloads/radarr/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab
    namespace: flux-system
  wait: true
  dependsOn:
    - name: apps-sabnzbd
    - name: apps-prowlarr
  components:
    - ../../../../components/volsync/hetzner
    - ../../../../components/keda/nas-nfs-scaler
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_CLAIM: radarr-config
