# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-recyclarr
  namespace: &namespace downloads
spec:
  targetNamespace: *namespace
  commonMetadata:
    labels:
      app.kubernetes.io/name: recyclarr
  interval: 30m
  timeout: 5m
  path: ./cluster/kubernetes/apps/downloads/recyclarr/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab
    namespace: flux-system
  wait: true
  dependsOn:
    - name: apps-sabnzbd
    - name: apps-sonarr
    - name: apps-radarr
  components:
    - ../../../../components/volsync/hetzner
  postBuild:
    substitute:
      APP: recyclarr
      VOLSYNC_CLAIM: recyclarr-config
