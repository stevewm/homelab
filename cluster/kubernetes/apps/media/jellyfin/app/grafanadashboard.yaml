# yaml-language-server: $schema=https://crds.stevewm.dev/crds/grafana.integreatly.org/grafanadashboard_v1beta1.json
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: jellyfin
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  configMapRef:
    name: jellyfin-grafana-dashboard
    key: dashboard.json
