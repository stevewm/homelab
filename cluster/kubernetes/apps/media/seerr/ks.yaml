# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-seerr
  namespace: &namespace media
spec:
  targetNamespace: *namespace
  commonMetadata:
    labels:
      app.kubernetes.io/name: &app seerr
  interval: 30m
  timeout: 5m
  path: ./cluster/kubernetes/apps/media/seerr/app
  prune: false
  sourceRef:
    kind: GitRepository
    name: homelab
    namespace: flux-system
  wait: true
  dependsOn:
    - name: apps-sonarr
      namespace: downloads
    - name: apps-radarr
      namespace: downloads
    - name: apps-jellyfin
  components:
    - ../../../../components/volsync/hetzner
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_CLAIM: jellyseerr-config
