# yaml-language-server: $schema=https://crds.stevewm.dev/crds/helm.toolkit.fluxcd.io/helmrelease_v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kguardian
spec:
  chartRef:
    kind: OCIRepository
    name: kguardian
  interval: 30m
  values:
    broker:
      requests:
        cpu: 100m
        memory: 256Mi
      resources:
        limits:
        # cpu: 500m
        memory: 1Gi
    controller:
      excludedNamespaces:
        - kguardian
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 1Gi
