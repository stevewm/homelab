# yaml-language-server: $schema=https://crds.stevewm.dev/crds/external-secrets.io/externalsecret_v1.json
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minecraft-users
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler
  target:
    name: minecraft
  data:
    - secretKey: whitelist
      remoteRef:
        key: MINECRAFT_SURVIVAL_WHITELIST
    - secretKey: ops
      remoteRef:
        key: MINECRAFT_SURVIVAL_OPS
    - secretKey: rcon_password
      remoteRef:
        key: MINECRAFT_RCON_PASSWORD
