# yaml-language-server: $schema=https://crds.stevewm.dev/crds/external-secrets.io/externalsecret_v1.json
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: romm
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler
  target:
    name: romm
  data:
    - secretKey: ROMM_AUTH_SECRET_KEY
      remoteRef:
        key: ROMM_AUTH_SECRET_KEY
